<!DOCTYPE html>
<html lang="en">    

<head>
<meta charset="UTF-8">
<title>Simple Layout</title>
</head>

<body>

<h1 style="margin-left: 20px">Some Header</h1>

<hr> </hr>

<div class="container">

    <div class="form-row">
        <div class="form-group">
            <label>Field 1</label>
            <input type="text">
        </div>

        <div class="form-group">
            <label>Field 2</label>
            <select>
                <option>Open menu</option>
            </select>
        </div>

        <div class="form-group">
            <label>Field 3</label>
            <textarea></textarea>
        </div>

        <button>Submit</button>
    </div>

    <hr>

    <table>
        <thead>
            <tr>
                <th>#</th>
                <th>First Name</th>
                <th>Last Name</th>
                <th>Superhero Name</th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <td>1</td>
                <td>Bruce</td>
                <td>Wayne</td>
                <td>Batman</td>
            </tr>
            <tr>
                <td>2</td>
                <td>Selina</td>
                <td>Kyle</td>
                <td>Catwoman</td>
            </tr>
            <tr>
                <td>3</td>
                <td>Diana</td>
                <td>Prince</td>
                <td>Wonder Woman</td>
            </tr>
            <tr>
                <td>4</td>
                <td>Harlene</td>
                <td>Quinzel</td>
                <td>Harley Quinn</td>
            </tr>
            <tr>
                <td>5</td>
                <td>Damian</td>
                <td>Wayne</td>
                <td>Robin</td>
            </tr>
        </tbody>
    </table>

</div>

</body>
</html>
